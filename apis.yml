name: Standardization
description: The process of implementing and developing technical standards based
  on the consensus of different parties, including firms, users, interest groups,
  standards organizations, and governments, to establish uniform engineering or technical
  criteria, methods, processes, and practices. Proper implementation reduces legal
  and operational risk while supporting audit readiness.
